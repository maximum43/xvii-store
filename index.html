<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XVII PERFUMES</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header>
        <div class="cart-icon" onclick="toggleCart()">
            <i class="fas fa-shopping-bag"></i>
            <span id="cart-count">0</span>
        </div>
        <div class="logo">XVII</div>
    </header>

    <div class="hero-text">عطورنا أصلية ومختارة بعناية</div>

    <section class="tabs-container">
        <button class="tab-btn active" onclick="filterCategory('all', this)">الكل</button>
        <button class="tab-btn" onclick="filterCategory('men', this)">رجالي</button>
        <button class="tab-btn" onclick="filterCategory('women', this)">نسائي</button>
        <button class="tab-btn" onclick="filterCategory('unisex', this)">مشترك</button>
    </section>

    <main>
        <div class="products-grid" id="products-container">
            </div>
    </main>

    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3>سلة مشترياتك</h3>
            <i class="fas fa-times close-btn" onclick="toggleCart()"></i>
        </div>
        
        <div class="cart-items" id="cart-items-container">
            <p class="empty-msg">سلة مشترياتك فارغة</p>
        </div>

        <div class="cart-footer">
            <div class="total-price">المجموع: <span id="cart-total">0</span> د.ل</div>
            <hr>
            <h4>إتمام الطلب</h4>
            <input type="text" id="customer-name" placeholder="الاسم بالكامل :" required>
            <input type="tel" id="customer-phone" placeholder="رقم الهاتف :" required>
            <input type="text" id="customer-address" placeholder="العنوان :" required>
            <textarea id="customer-notes" placeholder="ملاحظات أخرى : اختياري"></textarea>
            <button class="whatsapp-btn" onclick="sendToWhatsApp()">
                <i class="fab fa-whatsapp"></i> إرسال الطلب عبر واتساب
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
