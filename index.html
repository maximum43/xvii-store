
<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XVII Stock Control</title>

<style>
body{margin:0;font-family:Arial;direction:rtl;background:#fff}
header{background:#000;color:#fff;text-align:center;padding:15px;font-size:24px}
.container{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;padding:10px}
.card{border:1px solid #ddd;padding:10px;border-radius:10px;text-align:center}
img{width:100%;height:120px;object-fit:cover;border-radius:8px}
button{width:100%;padding:6px;margin-top:5px;border:none;background:#000;color:#fff;border-radius:5px}
.out{color:red;font-weight:bold}
.stock{color:#444;font-size:14px}
.small{display:flex;gap:5px;margin-top:5px}
.small button{flex:1;background:#333}
input{width:90%;padding:5px;margin-top:5px}
</style>
</head>

<body>

<header>XVII STOCK MANAGER</header>

<div class="container" id="list"></div>

<script>

// العطور
let perfumes = [
{name:"Dior Sauvage",price:350,image:"https://via.placeholder.com/300",stock:3},
{name:"Chanel Bleu",price:400,image:"https://via.placeholder.com/300",stock:1},
{name:"Armani Code",price:300,image:"https://via.placeholder.com/300",stock:0}
];

// عرض
function load(){
let box=document.getElementById("list");
box.innerHTML="";

perfumes.forEach((p,i)=>{

box.innerHTML+=`
<div class="card">
<img src="${p.image}">
<h4>${p.name}</h4>
<p>${p.price} د.ل</p>
<div class="stock">الكمية: ${p.stock}</div>

${
p.stock>0
? `<button onclick="sell(${i})">طلب</button>`
: `<div class="out">نفذ المخزون</div>`
}

<div class="small">
<button onclick="add(${i})">+1</button>
<button onclick="remove(${i})">-1</button>
</div>

<input type="number" placeholder="تعديل مباشر" onchange="setStock(${i},this.value)">
</div>
`;
});
}

// بيع
function sell(i){
if(perfumes[i].stock<=0){
alert("نفذ المخزون");
return;
}
perfumes[i].stock--;
window.open("https://wa.me/218911277527?text=طلب%20عطر:%20"+perfumes[i].name);
load();
}

// +1
function add(i){
perfumes[i].stock++;
load();
}

// -1
function remove(i){
if(perfumes[i].stock>0){
perfumes[i].stock--;
}
load();
}

// تعديل مباشر
function setStock(i,val){
perfumes[i].stock = Number(val);
load();
}

load();

</script>

</body>
</html>
