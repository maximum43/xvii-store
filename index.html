<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XVII Perfumes</title>

<style>
body{
font-family: Arial;
margin:0;
background:#fff;
color:#111;
direction:rtl;
}

header{
background:#000;
color:#fff;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.tagline{
text-align:center;
margin:15px;
font-size:16px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:10px;
padding:10px;
}

.card{
border:1px solid #ddd;
padding:10px;
border-radius:10px;
text-align:center;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

button{
background:#000;
color:#fff;
border:none;
padding:8px;
margin-top:8px;
width:100%;
border-radius:8px;
cursor:pointer;
}

#formBox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
padding:20px;
box-sizing:border-box;
}

.form{
background:#fff;
padding:15px;
border-radius:10px;
margin-top:50px;
}

input{
width:100%;
padding:8px;
margin:5px 0;
}

.close{
background:red;
}

</style>
</head>

<body>

<header>XVII</header>
<div class="tagline">عطورنا أصلية ومختارة بعناية</div>

<div class="container" id="products"></div>

<div id="formBox">
<div class="form">
<h3>إتمام الطلب</h3>
<input id="name" placeholder="الاسم الكامل">
<input id="phone" placeholder="رقم الهاتف">
<input id="location" placeholder="رابط الموقع من Google Maps">
<input id="note" placeholder="ملاحظات">

<button onclick="sendOrder()">إرسال عبر واتساب</button>
<button class="close" onclick="closeForm()">إغلاق</button>
</div>
</div>

<script>
let selectedProduct = "";

let products = [
{name:"Dior Sauvage", price:"350", img:"https://via.placeholder.com/200"},
{name:"Bleu de Chanel", price:"320", img:"https://via.placeholder.com/200"},
{name:"Acqua Di Gio", price:"300", img:"https://via.placeholder.com/200"},
{name:"Versace Eros", price:"280", img:"https://via.placeholder.com/200"},
{name:"Tom Ford Noir", price:"400", img:"https://via.placeholder.com/200"},
{name:"Creed Aventus", price:"500", img:"https://via.placeholder.com/200"},
{name:"YSL Y", price:"310", img:"https://via.placeholder.com/200"},
{name:"212 Men", price:"260", img:"https://via.placeholder.com/200"},
{name:"One Million", price:"270", img:"https://via.placeholder.com/200"},
{name:"Invictus", price:"250", img:"https://via.placeholder.com/200"}
];

function load(){
let box = document.getElementById("products");
products.forEach((p,i)=>{
box.innerHTML += `
<div class="card">
<img src="${p.img}">
<h4>${p.name}</h4>
<p>${p.price} د.ل</p>
<button onclick="order('${p.name}')">اطلب الآن</button>
</div>
`;
});
}

function order(name){
selectedProduct = name;
document.getElementById("formBox").style.display="block";
}

function closeForm(){
document.getElementById("formBox").style.display="none";
}

function sendOrder(){
let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let location = document.getElementById("location").value;
let note = document.getElementById("note").value;

let msg =
`طلب جديد من XVII%0A
العطر: ${selectedProduct}%0A
الاسم: ${name}%0A
الهاتف: ${phone}%0A
الموقع: ${location}%0A
ملاحظات: ${note}`;

window.open("https://wa.me/218911277527?text=" + msg);
}

load();
</script>

</body>
</html>
