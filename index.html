<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر العطور الفاخرة</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!-- شريط التنقل العلوي -->
    <header>
        <div class="logo">أريج الفخامة</div>
        <div class="cart-icon" onclick="toggleCart()">
            🛒 <span id="cart-count">0</span>
        </div>
    </header>

    <!-- القسم الرئيسي -->
    <main>
        <section class="hero">
            <h1>اكتشف عاصفة من الجاذبية</h1>
            <p>مجموعة حصرية من العطور العالمية الفاخرة بين يديك.</p>
        </section>

        <!-- حاوية عرض المنتجات -->
        <section class="products" id="products-container">
            <!-- المنتجات سيتم تحميلها ديناميكياً بواسطة الجافا سكريبت -->
        </section>
    </main>

    <!-- سلة التسوق الجانبية -->
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3>سلة التسوق</h3>
            <button class="close-btn" onclick="toggleCart()">×</button>
        </div>
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-footer">
            <p>الإجمالي: <span id="cart-total">0</span> د.ل</p>
            <button class="checkout-btn" onclick="checkoutWhatsApp()">تأكيد الطلب عبر الواتساب</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
