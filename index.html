<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XVII Perfumes</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#fff;
color:#111;
}

header{
background:#000;
color:#fff;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:40px;
font-weight:bold;
letter-spacing:4px;
}

nav a{
color:white;
text-decoration:none;
margin:0 10px;
}

.hero{
background:#111;
color:white;
padding:60px 20px;
display:flex;
flex-wrap:wrap;
align-items:center;
justify-content:space-between;
}

.hero-text{
max-width:500px;
}

.hero-text h1{
font-size:70px;
margin-bottom:15px;
}

.hero-text p{
font-size:22px;
margin-bottom:20px;
}

.hero img{
width:350px;
max-width:100%;
}

.whatsapp-btn{
background:white;
color:black;
padding:12px 20px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
}

.sections{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
padding:20px;
}

.section-box{
border-radius:15px;
overflow:hidden;
position:relative;
}

.section-box img{
width:100%;
height:280px;
object-fit:cover;
}

.section-content{
position:absolute;
top:20px;
right:20px;
color:white;
}

.section-content h2{
font-size:40px;
}

.products{
padding:30px 20px;
}

.title{
font-size:35px;
text-align:center;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
}

.card{
border:1px solid #ddd;
border-radius:12px;
padding:10px;
text-align:center;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
}

.card h3{
margin:10px 0;
}

.card button{
background:black;
color:white;
border:none;
padding:10px;
width:100%;
border-radius:8px;
cursor:pointer;
}

.order-box{
position:fixed;
bottom:20px;
left:20px;
background:black;
padding:15px;
border-radius:15px;
width:300px;
}

.order-box h3{
color:white;
margin-bottom:10px;
}

.order-box input{
width:100%;
padding:10px;
margin-bottom:8px;
}

.order-box button{
width:100%;
padding:12px;
background:#25D366;
color:white;
border:none;
border-radius:8px;
font-size:16px;
}

footer{
background:black;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}
</style>
</head>
<body>

<header>
<div class="logo">XVII</div>

<nav>
<a href="#">الرئيسية</a>
<a href="#men">رجالي</a>
<a href="#women">نسائي</a>
<a href="#">تواصل معنا</a>
</nav>
</header>

<section class="hero">
<div class="hero-text">
<h1>XVII</h1>
<p>عطورنا أصلية ومختارة بعناية</p>

<a class="whatsapp-btn"
href="https://wa.me/218911277527">
اطلب الآن عبر واتساب
</a>
</div>

<img src="https://images.unsplash.com/photo-1541643600914-78b084683601?w=800" alt="">
</section>

<section class="sections">

<div class="section-box">
<img src="https://images.unsplash.com/photo-1594035910387-fea47794261f?w=1200">
<div class="section-content">
<h2>قسم رجالي</h2>
</div>
</div>

<div class="section-box">
<img src="https://images.unsplash.com/photo-1523293182086-7651a899d37f?w=1200">
<div class="section-content">
<h2>قسم نسائي</h2>
</div>
</div>

</section>

<section class="products" id="men">
<h2 class="title">عطور رجالية</h2>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1541643600914-78b084683601?w=500">
<h3>Dior Sauvage</h3>
<p>350 د.ل</p>
<button onclick="order('Dior Sauvage')">اطلب الآن</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1615634260167-c8cdede054de?w=500">
<h3>Bleu de Chanel</h3>
<p>320 د.ل</p>
<button onclick="order('Bleu de Chanel')">اطلب الآن</button>
</div>

</div>
</section>

<section class="products" id="women">
<h2 class="title">عطور نسائية</h2>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?w=500">
<h3>Miss Dior</h3>
<p>330 د.ل</p>
<button onclick="order('Miss Dior')">اطلب الآن</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1588405748880-12d1d2a59b65?w=500">
<h3>Coco Chanel</h3>
<p>350 د.ل</p>
<button onclick="order('Coco Chanel')">اطلب الآن</button>
</div>

</div>
</section>

<div class="order-box">

<h3>إتمام الطلب</h3>

<input id="customerName" placeholder="الاسم الكامل">
<input id="customerPhone" placeholder="رقم الهاتف">
<input id="customerLocation" placeholder="رابط Google Maps">

<button onclick="sendOrder()">
إرسال الطلب عبر واتساب
</button>

</div>

<footer>
XVII Perfumes © 2026
</footer>

<script>

let selectedProduct="";

function order(product){
selectedProduct=product;
window.scrollTo({
top:document.body.scrollHeight,
behavior:'smooth'
});
}

function sendOrder(){

let name=document.getElementById("customerName").value;
let phone=document.getElementById("customerPhone").value;
let location=document.getElementById("customerLocation").value;

let msg=
`طلب جديد من XVII
العطر: ${selectedProduct}
الاسم: ${name}
الهاتف: ${phone}
الموقع: ${location}`;

window.open(
`https://wa.me/218911277527?text=${encodeURIComponent(msg)}`
);

}

</script>

</body>
</html>
