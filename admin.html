<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | XVII</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="admin-body">
    
    <header>
        <div class="logo"><a href="index.html" style="text-decoration: none; color: inherit;">X V I I</a></div>
    </header>

    <!-- Login Section -->
    <div class="admin-login" id="admin-login">
        <h2>لوحة التحكم</h2>
        <p>يرجى إدخال كلمة المرور للدخول.</p>
        <div class="form-group">
            <label>كلمة المرور</label>
            <input type="password" id="admin-password">
        </div>
        <button class="login-btn" onclick="checkPassword()">دخول</button>
    </div>

    <!-- Dashboard Section -->
    <div class="admin-dashboard" id="admin-dashboard" style="display: none;">
        <h2>إدارة العطور</h2>
        
        <div class="add-product-form">
            <h3>إضافة عطر جديد</h3>
            <input type="text" id="prod-name" placeholder="اسم العطر">
            <input type="number" id="prod-price" placeholder="السعر (د.ل)">
            <select id="prod-category">
                <option value="رجالي">رجالي</option>
                <option value="نسائي">نسائي</option>
                <option value="مشترك">مشترك</option>
            </select>
            <input type="file" id="prod-image" accept="image/*">
            <button onclick="addProduct()">إضافة العطر</button>
        </div>

        <h3>المنتجات الحالية</h3>
        <div class="admin-product-list" id="admin-product-list">
            <!-- المنتجات ستظهر هنا -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
